<!DOCTYPE html>
<!--
  admin-notifications.html — Notifications & Announcements
  Admins publish company-wide notices visible to all employees.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — HR Portal Admin</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<button class="sidebar-toggle" id="sidebar-toggle">☰</button>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="top-bar">
      <span class="top-bar-title" id="top-bar-title"></span>
      <span class="top-bar-date" id="top-bar-date"></span>
    </div>
    <div class="page-content" id="page-content"></div>
  </div>
</div>

<!-- Compose Modal -->
<div class="modal" id="notif-modal">
  <div class="modal-backdrop"></div>
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Publish Announcement</span>
      <button class="modal-close" onclick="Utils.closeModal('notif-modal')">✕</button>
    </div>
    <div id="n-error" class="alert alert-error" style="display:none"><span>⚠</span><span id="n-error-msg"></span></div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input type="text" id="n-title" class="form-input" placeholder="Announcement title">
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <select id="n-type" class="form-select">
        <option value="info">ℹ️ Info</option>
        <option value="holiday">🏖️ Holiday</option>
        <option value="warning">⚠️ Warning</option>
        <option value="policy">📋 Policy</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Message *</label>
      <textarea id="n-body" class="form-textarea" rows="4" placeholder="Write the full announcement message…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="Utils.closeModal('notif-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="publish()">📢 Publish</button>
    </div>
  </div>
</div>

<script src="../js/db.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/shell.js"></script>
<script>
DB.seed();
Shell.render({ type: 'admin', activePage: 'admin-notifications.html', pageTitle: 'Notifications' });

const typeIcon = { info: 'ℹ️', holiday: '🏖️', warning: '⚠️', policy: '📋' };

function render() {
  const notices = DB.all('notifications').sort((a, b) => b.created_at.localeCompare(a.created_at));

  document.getElementById('page-content').innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title">Notifications</h1>
        <div class="page-sub">${notices.length} announcement(s) published</div>
      </div>
      <button class="btn btn-primary" onclick="Utils.openModal('notif-modal')">+ New Announcement</button>
    </div>

    ${notices.length === 0
      ? '<div class="card"><div class="empty-state"><div class="empty-icon">📢</div><p>No announcements yet. Publish one above.</p></div></div>'
      : `<div style="display:flex; flex-direction:column; gap:1rem;">
          ${notices.map(n => `
            <div class="card" style="border-left: 4px solid var(--accent);">
              <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:1rem;">
                <div style="display:flex; gap:0.75rem; align-items:flex-start; flex:1;">
                  <span style="font-size:1.4rem;">${typeIcon[n.type] || '📢'}</span>
                  <div style="flex:1;">
                    <div style="font-weight:600; font-size:1rem; margin-bottom:0.4rem;">${Utils.sanitize(n.title)}</div>
                    <p style="font-size:0.875rem; margin-bottom:0.5rem;">${Utils.sanitize(n.body)}</p>
                    <div style="font-size:0.72rem; color:var(--text-muted);">
                      Published by <strong>${Utils.sanitize(n.created_by)}</strong> · ${Utils.formatDateTime(n.created_at)}
                    </div>
                  </div>
                </div>
                <button class="btn btn-danger btn-sm" onclick="deleteNotice(${n.id})" title="Delete">✕</button>
              </div>
            </div>
          `).join('')}
        </div>`
    }
  `;
}

function publish() {
  const title = Utils.stripTags(document.getElementById('n-title').value.trim());
  const type  = document.getElementById('n-type').value;
  const body  = Utils.stripTags(document.getElementById('n-body').value.trim());

  document.getElementById('n-error').style.display = 'none';
  const errors = Utils.validateForm([
    { name: 'Title',   value: title, rules: ['required', { minLength: 5 }] },
    { name: 'Message', value: body,  rules: ['required', { minLength: 10 }] },
  ]);
  if (errors.length > 0) {
    document.getElementById('n-error').style.display = 'flex';
    document.getElementById('n-error-msg').textContent = errors[0];
    return;
  }

  const admin = Auth.getSession();
  DB.insert('notifications', { title, type, body, created_by: admin.username });
  DB.log(admin.fullName, 'NOTIFICATION_PUBLISH', `Published: "${title}"`);
  Utils.closeModal('notif-modal');
  document.getElementById('n-title').value = '';
  document.getElementById('n-body').value  = '';
  Utils.toast('Announcement published!', 'success');
  render();
}

function deleteNotice(id) {
  if (!confirm('Delete this announcement?')) return;
  DB.remove('notifications', id);
  const admin = Auth.getSession();
  DB.log(admin.fullName, 'NOTIFICATION_DELETE', `Deleted notice #${id}`);
  Utils.toast('Announcement deleted.', 'warning');
  render();
}

render();
</script>
</body>
</html>
