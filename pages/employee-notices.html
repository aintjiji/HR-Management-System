<!DOCTYPE html>
<!--
  employee-notices.html — Company Announcements & Policies
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notices — HR Portal</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<button class="sidebar-toggle" id="sidebar-toggle">☰</button>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="top-bar">
      <span class="top-bar-title" id="top-bar-title"></span>
      <span class="top-bar-date" id="top-bar-date"></span>
    </div>
    <div class="page-content" id="page-content"></div>
  </div>
</div>
<script src="../js/db.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/shell.js"></script>
<script>
DB.seed();
Shell.render({ type:'employee', activePage:'employee-notices.html', pageTitle:'Notices' });

function render() {
  const notices = DB.all('notifications').sort((a,b) => b.created_at.localeCompare(a.created_at));
  const typeIcon = { info:'ℹ️', holiday:'🏖️', warning:'⚠️', policy:'📋' };

  document.getElementById('page-content').innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title">Company Notices</h1>
        <div class="page-sub">Announcements, policies, and holiday notices</div>
      </div>
    </div>

    ${notices.length === 0
      ? '<div class="empty-state card"><div class="empty-icon">📢</div><p>No notices at this time.</p></div>'
      : `<div style="display:flex; flex-direction:column; gap:1rem;">
          ${notices.map(n => `
            <div class="card" style="border-left:4px solid var(--accent);">
              <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:1rem;">
                <div style="display:flex; gap:0.75rem; align-items:flex-start;">
                  <span style="font-size:1.4rem;">${typeIcon[n.type] || '📢'}</span>
                  <div>
                    <div style="font-weight:600; font-size:1rem; margin-bottom:0.4rem;">${Utils.sanitize(n.title)}</div>
                    <p style="font-size:0.875rem; color:var(--text-secondary);">${Utils.sanitize(n.body)}</p>
                  </div>
                </div>
                <div style="font-size:0.75rem; color:var(--text-muted); white-space:nowrap;">${Utils.formatDateTime(n.created_at)}</div>
              </div>
            </div>
          `).join('')}
        </div>`
    }
  `;
}
render();
</script>
</body>
</html>
